# cricket infrastructure configuration (non-secret). Copy to config.toml and edit.
#
# This file is INFRA ONLY. Behavioral config -- the bot identity, per-location
# engagement/directives, prompts, and inference params -- lives in persona PROFILES
# in the committed config DB and is edited at runtime via the HTTP control panel.
#
# Secrets (host, port, account, password, control port, http port) live in .env.
# See .env.example.

[control]
# Default control-socket port; overridden by CRICKET_MUSH_CONTROL_PORT.
port = 4250

[http]
# Local control panel + config API. Loopback only. Port overridden by CRICKET_HTTP_PORT.
host = "127.0.0.1"
port = 4280

[paths]
# Config DB is committed (profiles only -- no secrets). Memory DB is gitignored.
config_db = "data/cricket-config.sqlite3"
memory_db = "data/cricket-memory.sqlite3"

[auth]
# Global grants by dbref. Names are spoofable -- always gate on dbref. Per-location
# admins are set per profile location. The local console is always OPERATOR.
operators = []            # e.g. ["#1"]
wizards   = []
admins    = []            # e.g. ["#1234"]
